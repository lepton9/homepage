name: CI

on:
  push:
  pull_request:

jobs:
  lint_and_format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Prettier (check)
        run: npm run formatcheck

      - name: ESLint
        run: npm run lint
